        { id:78, q:"Place life cycle phases in order (initiating first).", opts:["A. Initiating","B. Organizing","C. Carrying out","D. Ending"], correct:"A" },
        { id:79, q:"Which characteristic suggests predictive? (defined deliverables)", opts:["A. high change","B. evolving goals","C. defined deliverables","D. multiple releases"], correct:"C" },
        { id:80, q:"In a project, who has highest authority for scope/schedule/budget changes?", opts:["A. PM","B. BA","C. QA manager","D. sponsor"], correct:"D" },
        { id:81, q:"In adaptive approach, which describes team actions?", opts:["A. work on highest priority backlog","B. sequential tasks","C. gather all requirements at beginning","D. take turns leading"], correct:"A" },
        { id:82, q:"Which document authorizes project existence and starting point?", opts:["A. project charter","B. procurement contract","C. PM plan","D. scope statement"], correct:"A" },
        { id:83, q:"(extra) gold plating impact?", opts:["A. scope up cost same","B. scope up cost up","C. scope same cost down","D. scope same cost up"], correct:"B" },
        { id:84, q:"Predictive vs adaptive: flexibility to make adjustments?", opts:["A. Predictive","B. Adaptive"], correct:"B" },
        { id:85, q:"Which is a vendor?", opts:["A. external supplier","B. procurement negotiator","C. business analyst","D. experienced seller"], correct:"A" },
        { id:86, q:"status update includes?", opts:["A. work completed","B. stakeholder list","C. goals","D. scope desc"], correct:"A" },
        { id:87, q:"team member signs NDA, sees violation: ethical?", opts:["A. email all","B. let PM discover","C. bring to PM","D. remind team"], correct:"C" }
    ];

    const quizRoot = document.getElementById('quizRoot');
    function renderQuiz() {
        let html = '';
        for (let q of questionsData) {
            const optLetters = ['A', 'B', 'C', 'D'];
            html += `<div class="question-panel" id="q-${q.id}" data-qid="${q.id}">`;
            html += `<div class="q-title"><span class="q-num">${q.id}</span> Question</div>`;
            html += `<div class="question-text">${q.q}</div>`;
            html += `<div class="options" id="opts-${q.id}">`;
            for (let i=0; i<q.opts.length; i++) {
                let letter = optLetters[i];
                html += `<label class="option-item">`;
                html += `<input type="radio" name="q${q.id}" value="${letter}">`;
                html += `<span class="option-letter">${letter}.</span>`;
                html += `<span class="option-text">${q.opts[i].substring(3)}</span>`;
                html += `</label>`;
            }
            html += `</div>`;
            html += `<div class="feedback-row" id="fb-${q.id}" style="display: none;"></div>`;
            html += `</div>`;
        }
        quizRoot.innerHTML = html;
    }
    renderQuiz();

    document.getElementById('submitQuiz').addEventListener('click', function() {
        let anySelected = false;
        for (let q of questionsData) {
            const radios = document.getElementsByName(`q${q.id}`);
            let selected = null;
            for (let r of radios) if (r.checked) { selected = r.value; anySelected = true; break; }
            const fbDiv = document.getElementById(`fb-${q.id}`);
            const panel = document.getElementById(`q-${q.id}`);
            // remove previous highlight classes
            panel.classList.remove('correct-highlight', 'wrong-highlight');
            if (selected) {
                const isCorrect = (selected === q.correct);
                if (isCorrect) panel.classList.add('correct-highlight');
                else panel.classList.add('wrong-highlight');
                // build feedback
                let rightText = '';
                const opts = q.opts;
                const letterMap = { 'A':0,'B':1,'C':2,'D':3 };
                const correctIndex = letterMap[q.correct];
                rightText = opts[correctIndex] ? opts[correctIndex] : q.correct;
                let selectedText = '';
                if (letterMap[selected] !== undefined) selectedText = opts[letterMap[selected]] || selected;
                else selectedText = selected;

                fbDiv.style.display = 'block';
                fbDiv.innerHTML = `<div class="feedback-item">
                    <span class="feedback-badge">your answer:</span> <span class="your-answer">${selectedText}</span>
                    <span class="feedback-badge">correct answer:</span> <span class="right-answer">${rightText}</span>
                    <span class="${isCorrect ? 'feedback-correct' : 'feedback-wrong'}">${isCorrect ? '✓ right' : '✗ wrong'}</span>
                </div>`;
            } else {
                fbDiv.style.display = 'none';
                panel.classList.remove('correct-highlight', 'wrong-highlight');
            }
        }
        const msgDiv = document.getElementById('messageArea');
        if (!anySelected) {
            msgDiv.innerHTML = '<span class="warning-no-selection">⚠️ select at least one answer before submit</span>';
        } else {
            msgDiv.innerHTML = '';
        }
    });
})();
</script>
</body>
</html>
